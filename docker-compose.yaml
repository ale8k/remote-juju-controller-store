services:
  rcsd:
    image: cosmtrek/air
    container_name: rcsd
    working_dir: /app
    command: -c local/air/.air.toml
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
      - go-cache:/root/.cache/go-build
    ports:
      - "8484:8484"
    depends_on:
      rcs-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8484/healthz"]
      interval: 5s
      timeout: 5s
      retries: 12

  rcs-keycloak:
    image: docker.io/bitnamilegacy/keycloak:23
    container_name: rcs-keycloak
    environment:
      KEYCLOAK_HTTP_PORT: 3082
      KEYCLOAK_ENABLE_HEALTH_ENDPOINTS: true
      KEYCLOAK_CREATE_ADMIN_USER: true
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_DATABASE_VENDOR: dev-file
      KEYCLOAK_EXTRA_ARGS: >-
        -Dkeycloak.migration.action=import
        -Dkeycloak.migration.provider=singleFile
        -Dkeycloak.migration.file=/bitnami/keycloak/data/import/realm.json
        -Dkeycloak.migration.replace-placeholders=true
        -Dkeycloak.profile.feature.upload_scripts=enabled
    volumes:
      - ./local/keycloak/rcs-realm.json:/bitnami/keycloak/data/import/realm.json:ro
    ports:
      - "3082:3082"
    healthcheck:
      test: ["CMD", "curl", "--head", "-fsS", "http://localhost:3082/health/ready"]
      interval: 5s
      timeout: 10s
      retries: 30

volumes:
  go-modules:
  go-cache:

